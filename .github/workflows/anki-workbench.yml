name: Anki Workbench

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  WORKBENCH_VERSION: "0.4.0"

jobs:
  deck-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
      - name: Install Socket Firewall
        run: npm install -g sfw
      - name: Install Anki Workbench
        run: sfw pip install "anki-addon-workbench[gui]==${WORKBENCH_VERSION}"
      - name: Build APKG and run disposable Anki smoke
        run: make UV="sfw uv" workbench-smoke
